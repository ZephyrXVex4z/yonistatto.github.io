<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos Anteriores • Yonistatto</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap');

    :root {
      --slav: 'Playfair Display', 'Georgia', serif;
      --calibri: 'Calibri', 'Gill Sans', 'Trebuchet MS', sans-serif;
      --ink: #0a0a0a;
      --bone: #f0ede8;
      --gold: #c8a96a;
      --glass: rgba(255,255,255,0.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--ink);
      color: var(--bone);
      font-family: var(--calibri);
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; opacity: .6;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 5rem 2rem 3rem;
    }

    header h1 {
      font-family: var(--slav);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      color: var(--bone);
      line-height: 1.1;
    }

    header h1 span {
      color: var(--gold);
    }

    header p {
      font-family: var(--calibri);
      font-size: .9rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(240,237,232,.4);
      margin-top: 1rem;
    }

    /* ── BACK LINK ── */
    .back-container {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .btn-back {
      font-family: var(--calibri);
      font-size: .85rem;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: .15em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color .25s;
    }

    .btn-back:hover {
      color: var(--bone);
    }

    /* ── GALLERY GRID ── */
    .gallery-section {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      flex: 1;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2rem;
    }

    .gallery-item {
      background: var(--glass);
      border: 1px solid rgba(200,169,106,.15);
      overflow: hidden;
      aspect-ratio: 1 / 1; /* Cuadradas estilo Instagram, ideal para tatuajes */
      position: relative;
      transition: border-color .3s, transform .3s;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .5s ease;
    }

    .gallery-item:hover {
      border-color: rgba(200,169,106,.45);
      transform: translateY(-4px);
    }

    .gallery-item:hover img {
      transform: scale(1.06);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-family: var(--calibri);
      font-size: .72rem;
      letter-spacing: .1em;
      color: rgba(240,237,232,.18);
      border-top: 1px solid rgba(255,255,255,.04);
      position: relative; z-index: 1;
      margin-top: auto;
    }
  </style>
</head>
<body>

  <!-- ══ BOTÓN VOLVER ══ -->
  <div class="back-container" style="margin-top: 3rem;">
    <a href="index.html" class="btn-back">⬅️ Volver al inicio</a>
  </div>

  <!-- ══ CABECERA ══ -->
  <header>
    <h1>Proyectos <span>Anteriores</span></h1>
    <p>Una muestra del trazo y la tinta en la piel</p>
  </header>

  <!-- ══ GALERÍA DE IMÁGENES ══ -->
  <main class="gallery-section">
    <div class="gallery-grid">

      <!-- Imagen 1 -->
      <div class="gallery-item">
        <img src="IMG-20260621-WA0000.jpg" alt="Proyecto de tatuaje Yonistatto" loading="lazy">
      </div>

      <!-- Imagen 2 -->
      <div class="gallery-item">
        <img src="IMG-20260621-WA0001.jpg" alt="Proyecto de tatuaje Yonistatto" loading="lazy">
      </div>

      <!-- Imagen 3 -->
      <div class="gallery-item">
        <img src="IMG-20260621-WA0002.jpg" alt="Proyecto de tatuaje Yonistatto" loading="lazy">
      </div>

      <!-- Imagen 4 -->
      <div class="gallery-item">
        <img src="IMG-20260621-WA0003.jpg" alt="Proyecto de tatuaje Yonistatto" loading="lazy">
      </div>

    </div>
  </main>

  <!-- ══ BOTÓN VOLVER INFERIOR ══ -->
  <div class="back-container" style="margin-bottom: 5rem;">
    <a href="index.html" class="btn-back">⬅️ Volver al inicio</a>
  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
    © 2026 Yonistatto · Playa del Carmen, Quintana Roo · Todos los derechos reservados
  </footer>

</body>
  </html>
